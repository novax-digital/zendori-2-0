name: Worker Image

on:
  push:
    branches: [main]
    paths:
      - 'apps/worker/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/worker-image.yml'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/worker/Dockerfile
          push: true
          # pinned, immutable tag per commit — deploy by setting WORKER_IMAGE_TAG on the VPS
          tags: |
            ghcr.io/${{ github.repository_owner }}/zendori-worker:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/zendori-worker:main
